# Active paper-trading strategies. The dashboard reads this file to discover
# which strategies to render; the paper-trading daemons only look at their own
# portfolio DB and do not consult this file.
#
# Paths are resolved relative to this file. Each entry declares:
#   name         — stable identifier, used as the DB subdirectory and in logs.
#   display_name — label shown in the dashboard.
#   schema       — position schema. Two are wired today: "kalshi_binary"
#                  (PM Underwriting books) and "crypto_perp" (elder
#                  triple-screen perps). Add a new schema name and a
#                  matching dashboard renderer when a new position type
#                  ships; see docs/platform/dashboard.md "Adding a new
#                  schema" for the playbook.
#   portfolio_db — SQLite path relative to data/paper/.
#   log_dir      — directory the launchd wrapper writes into, relative to
#                  data/paper/. Used by the dashboard to surface last-tick
#                  timestamps and recent errors.
#   launchd_label — launchd job Label, used by the dashboard to show whether
#                   the scheduler is loaded.
#   enabled      — hide without deleting. Disabled strategies are still
#                  queryable for archive viewing.

[[strategy]]
name = "pm_underwriting"
display_name = "PM Underwriting · Lottery (0.85-1.0)"
schema = "kalshi_binary"
portfolio_db = "pm_underwriting/portfolio.db"
log_dir = "pm_underwriting/logs"
launchd_label = "com.prospector.paper-trade"
enabled = true

[[strategy]]
name = "pm_underwriting_insurance"
display_name = "PM Underwriting · Insurance (0.55-0.75)"
schema = "kalshi_binary"
portfolio_db = "pm_underwriting_insurance/portfolio.db"
log_dir = "pm_underwriting_insurance/logs"
launchd_label = "com.prospector.paper-trade-insurance"
enabled = true

[[strategy]]
name = "elder_triple_screen"
display_name = "Elder Triple-Screen · vol_q4 perps"
schema = "crypto_perp"
portfolio_db = "elder_triple_screen/portfolio.db"
log_dir = "elder_triple_screen/logs"
launchd_label = "com.prospector.paper-trade-elder"
enabled = true
